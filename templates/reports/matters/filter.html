<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Matter Summary</h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <form id="matters-report-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'reports:matters-filter' %}">
        {% csrf_token %}
        <label for="status">Matter Status:</label>
        <div>
          <select id="status" name="status">
            <option value="All" {% if filter_data.status == "All" %}selected{% endif %}>All</option>
            <option value="Open"
                    {% if filter_data.status == "Open" or not filter_data.status %}selected{% endif %}>Open</option>
            <option value="Pending"
                    {% if filter_data.status == "Pending" %}selected{% endif %}>Pending</option>
            <option value="Closed"
                    {% if filter_data.status == "Closed" %}selected{% endif %}>Closed</option>
            <option value="Complete"
                    {% if filter_data.status == "Complete" %}selected{% endif %}>Complete</option>
          </select>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn btn-secondary"
              hx-post="{% url 'management:clear-filters' session_key='matters_filter' trigger='mattersChanged' %}">
        Restore Defaults
      </button>
      <button type="submit"
              form="matters-report-filter-form"
              class="btn btn-success">Apply</button>
    </div>
  </div>
</div>
