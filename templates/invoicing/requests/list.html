{% block subcontent %}
  {% load humanize %}
  <div id="request-list">
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="filter-tools">
          <button type="button"
                  class="btn-icon"
                  hx-get="{% url 'invoicing:requests-new' %}"
                  hx-target="#htmx-modal-container"
                  hx-trigger="click"
                  data-bs-toggle="modal"
                  data-bs-target="#htmx-modal-container">
            <i class="icon-plus with-text"></i>Request Payment
          </button>
        </div>
      </div>
    </div>
    <div class="table-container">
      <table class="table requests">
        <tr>
          <th class="id">ID</th>
          <th class="date">Sent</th>
          <th class="matter">Matter</th>
          <th class="recipient">Recipient</th>
          <th class="amount">Amount</th>
          <th class="status">Status</th>
        </tr>
        {% for payment_request in objects %}
          {% include "invoicing/requests/row.html" %}
        {% empty %}
          <tr>
            <td colspan="6" class="empty-message">No payment requests yet.</td>
          </tr>
        {% endfor %}
      </table>
      <div>{% include "pagination.html" %}</div>
    </div>
  </div>
{% endblock subcontent %}
