<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Request Trust Deposit</h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      {% if error %}<div class="alert alert-danger" role="alert">{{ error }}</div>{% endif %}
      <form id="trust-form"
            hx-post="{% url 'invoicing:requests-new-trust' %}"
            hx-target="#htmx-modal-container"
            hx-indicator="#trust-submit"
            hx-disabled-elt="#trust-submit"
            hx-disinherit="hx-indicator hx-disabled-elt"
            class="form-compact">
        {% csrf_token %}
        <div class="form-group">
          <label for="trust-client">Client</label>
          <select id="trust-client"
                  name="client"
                  hx-get="{% url 'invoicing:requests-client-email' %}"
                  hx-trigger="change"
                  hx-target="#request-to"
                  hx-swap="outerHTML"
                  required>
            <option value="">Select a client…</option>
            {% for c in clients %}
              <option value="{{ c.id }}"
                      {% if client_id == c.id|stringformat:'s' %}selected{% endif %}>{{ c.name }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="form-group">
          <label for="request-to">To</label>
          {% include "invoicing/requests/to_input.html" %}
        </div>
        <div class="form-group">
          <label for="trust-amount">Deposit amount</label>
          <input type="text"
                 id="trust-amount"
                 name="amount"
                 value="{{ amount }}"
                 inputmode="decimal"
                 autocomplete="off"
                 placeholder="0.00"
                 required>
        </div>
        <div class="form-group">
          <label for="request-cc">Cc (optional)</label>
          <input type="email"
                 id="request-cc"
                 name="cc"
                 value="{{ cc }}"
                 autocomplete="off"
                 multiple
                 placeholder="name@example.com, name2@example.com">
        </div>
        <div class="form-group" x-data="{ max: 500, count: {{ message|length }} }">
          <label class="message-label" for="request-message">
            <span>Message (optional)</span>
            <span class="char-counter" x-text="count + ' / ' + max"></span>
          </label>
          <textarea id="request-message"
                    name="message"
                    rows="4"
                    maxlength="500"
                    placeholder="Enter a message to the client."
                    @input="count = $event.target.value.length">{{ message }}</textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn btn-secondary"
              @click="$dispatch('close-modal')">Cancel</button>
      <button type="submit"
              form="trust-form"
              id="trust-submit"
              class="btn btn-success btn-busy">
        <span class="btn-busy-idle">Request Deposit</span>
        <span class="btn-busy-loading"><span class="btn-spinner"></span> Sending…</span>
      </button>
    </div>
  </div>
</div>
