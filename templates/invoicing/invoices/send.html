<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">
        {% if invoice.date_sent %}
          Resend
        {% else %}
          Send
        {% endif %}
        Invoice #{{ invoice.id }}
      </h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      {% if error %}<div class="alert alert-danger" role="alert">{{ error }}</div>{% endif %}
      <form id="invoice-send-form"
            hx-post="{% url 'invoicing:invoices-send' pk=invoice.id %}"
            hx-target="#htmx-modal-container"
            class="form-compact">
        {% csrf_token %}
        <div class="form-group">
          <label for="invoice-send-to">To</label>
          <input type="email"
                 id="invoice-send-to"
                 name="to"
                 value="{{ default_to }}"
                 autocomplete="off"
                 required>
        </div>
        <div class="form-group">
          <label for="invoice-send-cc">Cc (optional)</label>
          <input type="email"
                 id="invoice-send-cc"
                 name="cc"
                 value="{{ default_cc }}"
                 autocomplete="off">
        </div>
        <div class="form-group"
             x-data="{ max: 500, count: {{ default_message|length }} }">
          <label class="message-label" for="invoice-send-message">
            <span>Message (optional)</span>
            <span class="char-counter" x-text="count + ' / ' + max"></span>
          </label>
          <textarea id="invoice-send-message"
                    name="message"
                    rows="4"
                    maxlength="500"
                    placeholder="Enter a message to the client (included in the email only). To annotate the invoice itself, add it to the invoice before sending."
                    @input="count = $event.target.value.length">{{ default_message }}</textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn btn-secondary"
              @click="$dispatch('close-modal')">Cancel</button>
      <button type="submit" form="invoice-send-form" class="btn btn-success">
        {% if invoice.date_sent %}
          Resend
        {% else %}
          Send
        {% endif %}
      </button>
    </div>
  </div>
</div>
