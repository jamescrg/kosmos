<div class="section">
  <div class="folders">
    <div class="toolbar">
      <div class="toolbar-left">
        <h1>Folders</h1>
      </div>
      <div class="toolbar-right">
        <button class="button-link"
                hx-get="{% url 'notes:folder-add' %}"
                hx-target="#htmx-modal-container"
                data-bs-toggle="modal"
                data-bs-target="#htmx-modal-container">
          <i class="icon-plus"></i>
        </button>
      </div>
    </div>
    <ul class="list-group">
      {% for folder in note_folders %}
        {% include "note_folders/folder.html" %}
      {% empty %}
        <li class="list-group-item empty-message">No folders found.</li>
      {% endfor %}
      <li class="folder-item-container list-group-item{% if not selected_note_folder %} item-selected-highlight{% endif %}">
        <div>
          <i class="icon-folder"></i>
          <a href="{% url 'notes:folder-unsorted' %}">Unsorted</a>
        </div>
      </li>
    </ul>
  </div>
</div>
