<div class="edit-folder">
  <input autofocus
         class="edit-folder-input"
         type="text"
         name="name"
         hx-post="/folders/update/{{ folder.id }}"
         hx-target="#folder-{{ folder.id }}"
         hx-trigger="change, blur"
         hx-swap="innerHTML"
         value="{{ folder.name }}" />
</div>
