{% load humanize %}
{% if intake.value %}
  <a href="#"
     hx-get="{% url 'intakes:value-edit' intake.id %}"
     hx-target="#intake-value-display">${{ intake.value|intcomma }}</a>
{% else %}
  <a href="#"
     class="empty-value-icon"
     hx-get="{% url 'intakes:value-edit' intake.id %}"
     hx-target="#intake-value-display">
    <i class="bi bi-pencil"></i>
  </a>
{% endif %}
