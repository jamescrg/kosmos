<div class="modal-dialog modal-lg">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Edit Highlight</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form class="form-compact"
            hx-post="{% url 'documents:edit-highlight' highlight.id %}"
            hx-target="#htmx-modal-container">
        {% csrf_token %}
        <div class="highlight-edit-grid">
          {{ form }}
          <br>
        </div>
        <div class="flex-center-space">
          <div>
            <button type="submit" class="submit">Save</button>
          </div>
          <div>
            <a class="delete-link"
               href="#"
               hx-confirm="Are you sure you want to delete this highlight?"
               hx-post="{% url 'documents:delete-highlight' highlight.id %}"
               hx-target="#highlight-card-{{ highlight.id }}"
               hx-swap="outerHTML"
               data-bs-dismiss="modal">Delete</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
