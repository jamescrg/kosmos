<div class="highlight-importance-badge dropdown"
     id="highlight-importance-{{ highlight.id }}">
  <button type="button"
          class="doc-badge importance-badge-btn"
          data-bs-toggle="dropdown"
          aria-expanded="false">
    <i class="bi bi-flag-fill"></i>{{ highlight.importance }}
  </button>
  <ul class="dropdown-menu">
    {% for i in importance_choices %}
      <li>
        <a class="dropdown-item {% if highlight.importance == i %}active{% endif %}"
           href="#"
           hx-post="{% url 'documents:highlight-importance' highlight.id i %}"
           hx-target="#highlight-importance-{{ highlight.id }}"
           hx-swap="outerHTML">{{ i }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
