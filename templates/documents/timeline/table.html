<div class="table-container">
  <table id="timeline-list" class="table timeline-list">
    <tr>
      <th class="date-time">
        Date and Time
        <button class="btn-sort {% if 'date' in current_order %}active{% endif %}"
                hx-get="{% url 'documents:timeline-sort' 'date' %}"
                hx-target="#timeline">
          <i class="bi bi-chevron-expand"></i>
        </button>
      </th>
      <th class="description">Description</th>
      <th class="importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'documents:timeline-sort' 'importance' %}"
                hx-target="#timeline"
                title="Sort by importance">
          <i class="bi bi-flag"></i>
        </button>
      </th>
    </tr>
    {% for fact in facts %}
      {% include "documents/timeline/fact-row.html" %}
    {% empty %}
      <tr>
        <td colspan="3" class="empty-message">No timeline entries found for this matter.</td>
      </tr>
    {% endfor %}
  </table>
</div>
