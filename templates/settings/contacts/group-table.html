<div class="toolbar">
  <div class="toolbar-left">
    <h1>Groups</h1>
    <div class="filter-tools">
      <button type="button"
              class="btn-icon"
              hx-get="{% url 'settings:add-group' %}"
              hx-target="#htmx-modal-container"
              hx-trigger="click"
              data-bs-toggle="modal"
              data-bs-target="#htmx-modal-container">
        <i class="bi bi-plus-lg"></i>
      </button>
    </div>
  </div>
</div>
<div class="table-container">
  <table class="table">
    <tr>
      <th>Name</th>
      <th>Order</th>
      <th class="actions-column"></th>
    </tr>
    {% for group in groups %}
      <tr>
        <td>{{ group.name }}</td>
        <td>{{ group.order }}</td>
        <td class="actions-column">
          <div class="dropdown">
            <button class="btn-icon"
                    type="button"
                    data-bs-toggle="dropdown"
                    aria-expanded="false">
              <i class="bi bi-three-dots-vertical"></i>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
              <li>
                <a class="dropdown-item"
                   hx-get="{% url 'settings:edit-group' group.id %}"
                   hx-target="#htmx-modal-container"
                   hx-trigger="click"
                   data-bs-toggle="modal"
                   data-bs-target="#htmx-modal-container">Edit</a>
              </li>
              <li>
                <a class="dropdown-item"
                   hx-post="{% url 'settings:delete-group' group.id %}"
                   hx-confirm="Are you sure you want to delete this group?">Delete</a>
              </li>
            </ul>
          </div>
        </td>
      </tr>
    {% empty %}
      <tr>
        <td colspan="3" class="empty-message">No groups found.</td>
      </tr>
    {% endfor %}
  </table>
</div>
