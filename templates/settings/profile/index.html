{% extends "settings/main.html" %}
{% block subcontent %}
  <div id="profile"
       hx-trigger="load, profileReload from:body"
       hx-get="{% url 'settings:personal-profile' %}"
       hx-target="this">{% include "settings/profile/profile.html" %}</div>
  <h2>Theme</h2>
  <hr />
  <p class="detail-text">Theme is stored per device.</p>
  <fieldset class="theme-options" onchange="setTheme(event.target.value)">
    <label class="theme-option">
      <input type="radio" name="theme" value="auto">
      <span>Auto <small>(match system)</small></span>
    </label>
    <label class="theme-option">
      <input type="radio" name="theme" value="light">
      <span>Light</span>
    </label>
    <label class="theme-option">
      <input type="radio" name="theme" value="dark">
      <span>Dark</span>
    </label>
  </fieldset>
  <script>
    (function () {
      var setting = (window.getThemeSetting && window.getThemeSetting()) || 'auto';
      var input = document.querySelector('.theme-options input[value="' + setting + '"]');
      if (input) input.checked = true;
    })();
  </script>
  <h2>Navigation</h2>
  <hr />
  <p class="detail-text">Navigation layout is stored per device.</p>
  <fieldset class="nav-options" onchange="setNavLayout(event.target.value)">
    <label class="nav-option">
      <input type="radio" name="nav-layout" value="vertical">
      <span>Vertical <small>(sidebar)</small></span>
    </label>
    <label class="nav-option">
      <input type="radio" name="nav-layout" value="horizontal">
      <span>Horizontal <small>(top bar)</small></span>
    </label>
  </fieldset>
  <script>
    (function () {
      var setting = (window.getNavLayoutSetting && window.getNavLayoutSetting()) || 'vertical';
      var input = document.querySelector('.nav-options input[value="' + setting + '"]');
      if (input) input.checked = true;
    })();
  </script>
{% endblock subcontent %}
