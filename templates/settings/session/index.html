{% extends "settings/main.html" %}
{% block subcontent %}
  <div class="section settings">
    <div class="toolbar">
      <h1>Log Out</h1>
    </div>
    <p class="section-text">Log out of all sessions on all devices.</p>
    <p class="section-text">
      Logged in as: <span class="username">{{ user.username }}</span>
    </p>
    <div class="integrations-list">
      <div class="integrations-item">
        <span>Session</span>
        <a class="btn btn-success" href="{% url 'accounts:logout' %}">Logout</a>
      </div>
    </div>
  </div>
{% endblock subcontent %}
