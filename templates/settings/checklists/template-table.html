<div class="toolbar">
  <div class="toolbar-left">
    <h2>Checklists</h2>
    <div class="filter-tools">
      <button type="button"
              hx-get="{% url 'settings:add-checklist-template' %}"
              hx-target="#htmx-modal-container"
              hx-trigger="click">
        <i class="icon-plus"></i>
      </button>
      <a class="{% if template_filter == 'active' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:checklist-template-filter' 'active' %}">Active</a>
      <a class="{% if template_filter == 'inactive' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:checklist-template-filter' 'inactive' %}">Inactive</a>
      <a class="{% if template_filter == 'all' %}toggle-active{% endif %}"
         href="#"
         hx-post="{% url 'settings:checklist-template-filter' 'all' %}">All</a>
    </div>
  </div>
</div>
<div class="table-container">
  <table class="table settings-table">
    <thead>
      <tr>
        <th>Name</th>
        <th class="center-data">Items</th>
        <th class="status-col center-data">Active</th>
      </tr>
    </thead>
    <tbody>
      {% for template in templates %}
        <tr>
          <td class="dropdown-cell">
            <div class="dropdown" x-data="dropdown()">
              <button class="button-link"
                      type="button"
                      x-ref="button"
                      @click="toggle()"
                      :aria-expanded="open">{{ template.name }}</button>
              <ul class="dropdown-menu" x-ref="menu" x-show="open">
                <li>
                  <a class="dropdown-item"
                     hx-get="{% url 'settings:edit-checklist-template' template.id %}"
                     hx-target="#htmx-modal-container"
                     hx-trigger="click"><i class="icon-pencil"></i> Edit</a>
                </li>
                <li>
                  <a class="dropdown-item"
                     hx-post="{% url 'settings:delete-checklist-template' template.id %}"
                     hx-confirm="Are you sure? This will delete the template. Existing task checklists will not be affected."><i class="icon-trash-2"></i> Delete</a>
                </li>
              </ul>
            </div>
          </td>
          <td class="center-data">{{ template.items.count }}</td>
          <td class="status-col center-data">
            {% if template.is_active %}
              <i class="icon-circle-check true-bool"></i>
            {% else %}
              <i class="icon-circle-x false-bool"></i>
            {% endif %}
          </td>
        </tr>
      {% empty %}
        <tr>
          <td colspan="3" class="empty-message">No checklist templates found.</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
