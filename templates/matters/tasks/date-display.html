{% if task.date_due %}
  <span class="task-date-wrapper">
    <a href="#"
       hx-get="{% url 'matters:tasks-date' matter.id task.id %}"
       hx-target="closest .task-date-wrapper"
       hx-on::before-request="this.closest('.task-date-wrapper').setAttribute('data-original', this.closest('.task-date-wrapper').innerHTML)">{{ task.date_due|date:'Y-m-d' }}</a>
  </span>
{% else %}
  <span class="task-date-wrapper">
    <a href="#"
       class="empty-date-icon"
       hx-get="{% url 'matters:tasks-date' matter.id task.id %}"
       hx-target="closest .task-date-wrapper"
       hx-on::before-request="this.closest('.task-date-wrapper').setAttribute('data-original', this.closest('.task-date-wrapper').innerHTML)">
      <i class="icon-calendar-plus"></i>
    </a>
  </span>
{% endif %}
