<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">
    {% if task.priority == 5 %}
      <i class="icon-chevrons-up"></i>
    {% elif task.priority == 4 %}
      <i class="icon-chevron-up"></i>
    {% elif task.priority == 3 %}
      <i class="icon-equal"></i>
    {% elif task.priority == 2 %}
      <i class="icon-chevron-down"></i>
    {% else %}
      <i class="icon-chevrons-down"></i>
    {% endif %}
  </button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-priority' matter.id task.id 5 %}"
         hx-target="#matterTasks"
         hx-swap="outerHTML"><i class="icon-chevrons-up importance-5"></i> Highest</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-priority' matter.id task.id 4 %}"
         hx-target="#matterTasks"
         hx-swap="outerHTML"><i class="icon-chevron-up importance-4"></i> High</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-priority' matter.id task.id 3 %}"
         hx-target="#matterTasks"
         hx-swap="outerHTML"><i class="icon-equal"></i> Normal</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-priority' matter.id task.id 2 %}"
         hx-target="#matterTasks"
         hx-swap="outerHTML"><i class="icon-chevron-down importance-2"></i> Low</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-post="{% url 'matters:tasks-priority' matter.id task.id 1 %}"
         hx-target="#matterTasks"
         hx-swap="outerHTML"><i class="icon-chevrons-down importance-1"></i> Lowest</a>
    </li>
  </ul>
</div>
