<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Filter Matters</h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <form id="matter-filter-form"
            class="form-responsive form-spacious filter"
            hx-target="#htmx-modal-container"
            hx-post="{% url 'matters:filter' %}">
        {% csrf_token %}
        {{ filter.form }}
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn btn-secondary"
              hx-post="{% url 'management:clear-filters' session_key='matter_filter' trigger='mattersChanged' %}">
        Restore Defaults
      </button>
      <button type="submit" form="matter-filter-form" class="btn btn-success">Apply</button>
    </div>
  </div>
</div>
