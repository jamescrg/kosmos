{% include "matters/includes/detail-nav.html" %}
<div class="section-body"
     hx-get="{{ tab_list_url }}"
     hx-trigger="load"
     hx-swap="innerHTML"></div>
<div id="mode-pills" class="mode-pills" hx-swap-oob="true">
  <a href="{% url 'matters:detail' id=matter.id %}"
     hx-get="{% url 'matters:mode-content' id=matter.id %}"
     hx-target="#mode-content"
     hx-push-url="{% url 'matters:detail' id=matter.id %}"
     class="mode-pill active">Detail</a>
  <a href="{% url 'case:select-matter' matter.id %}"
     hx-get="{% url 'case:mode-content' matter_id=matter.id %}"
     hx-target="#mode-content"
     hx-push-url="{% url 'case:select-matter' matter.id %}"
     class="mode-pill">Case</a>
</div>
