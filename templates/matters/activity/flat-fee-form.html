<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Add Flat-Fee Entry</h1>
      <div>
        <button type="button" @click="$dispatch('close-modal')">
          <i class="icon-x"></i>
        </button>
      </div>
    </div>
    <div class="modal-body">
      <form action="{% url 'activity:flat-fees-add' id=matter_id request_app=request_app|default:'matters' %}"
            method="post"
            class="form-compact col2 flat-fees-form"
            id="flat-fee-entry-form"
            {% if request_app == 'case' or request_app == 'matters' %}hx-post="{% url 'activity:flat-fees-add' id=matter_id request_app=request_app %}" hx-target="#htmx-modal-container"{% endif %}>
        {% csrf_token %}
        <div class="form-group">
          <label for="{{ form.matter.id_for_label }}">{{ form.matter.label }}</label>
          <div>{{ form.matter }}{{ form.matter.errors }}</div>
        </div>
        <div class="form-group">
          <label for="{{ form.date.id_for_label }}">{{ form.date.label }}</label>
          <div>{{ form.date }}{{ form.date.errors }}</div>
        </div>
        <div class="form-group span2">
          <label for="{{ form.description.id_for_label }}">{{ form.description.label }}</label>
          <div>{{ form.description }}{{ form.description.errors }}</div>
        </div>
        <div class="form-group">
          <label for="{{ form.amount.id_for_label }}">{{ form.amount.label }}</label>
          <div>{{ form.amount }}{{ form.amount.errors }}</div>
        </div>
        <div class="form-group">
          <label for="{{ form.comp.id_for_label }}">{{ form.comp.label }}</label>
          <div>{{ form.comp }}{{ form.comp.errors }}</div>
        </div>
        <div class="form-group">
          <label for="{{ form.entered.id_for_label }}">{{ form.entered.label }}</label>
          <div>{{ form.entered }}{{ form.entered.errors }}</div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button"
              class="btn btn-secondary"
              @click="$dispatch('close-modal')">Cancel</button>
      <button type="submit" form="flat-fee-entry-form" class="btn btn-success">Submit</button>
    </div>
  </div>
</div>
