<!-- -------------------------------------------------------- -->
<!-- Javascript Rate Picker -->
<!-- -------------------------------------------------------- -->
<script type="text/javascript">

    let rates = [];

    // pulls a specific matter, if user has selected one
    // otherwise, pulls a list of all open matters

    // for each matter, creates javascript array value
    // key  = matterId, value = hourlyRate
    {% for matter, rate in matter_rates.items %}
        rates[{{ matter }}] = {{ rate }}
    {% endfor %}

</script>
<div class="modal-dialog modal-md">
  <div class="modal-content">
    <div class="modal-header">
      <h1 class="modal-title">Add Time Entry</h1>
      <div>
        <a href="#" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i>
        </a>
      </div>
    </div>
    <div class="modal-body">
      <form hx-post="{% url 'activity:time-add' id=matter_id request_app='matters' %}"
            hx-target="#htmx-modal-container"
            class="form-compact col2 time-form"
            id="time-entry-form">
        {% csrf_token %}
        {{ form.matter }}
        {{ form.date }}
        {{ form.actions }}
        <div id="actions-preview" class="actions-preview span2">
          <small class="text-muted">Preview:</small>
          <div id="actions-preview-text"></div>
        </div>
        {{ form.hours }}
        {{ form.rate }}
        {{ form.comp }}
        {{ form.entered }}
        <br />
        <div class="flex-center-space span2">
          <div>
            <button type="submit" class="submit">Submit</button>
          </div>
          <div>
            <a class="button-link codes-reference-link"
               href="#"
               hx-get="{% url 'activity:codes-reference' %}"
               hx-target="#codes-reference-container"
               hx-swap="innerHTML">View Abbreviation Codes</a>
          </div>
        </div>
      </form>
      <div id="codes-reference-container"></div>
    </div>
  </div>
</div>
