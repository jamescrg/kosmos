{% if contacts %}
  <ul class="assign-results">
    {% for contact in contacts %}
      <li>
        <a href="#"
           hx-get="{% url 'matters:contacts-assign-role' matter_id=matter.id contact_id=contact.id %}"
           hx-target="#htmx-modal-container">{{ contact.name }}</a>
      </li>
    {% endfor %}
  </ul>
{% endif %}
