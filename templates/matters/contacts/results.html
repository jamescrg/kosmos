{% if contacts is not None %}
  <ul class="assign-results">
    {% for contact in contacts %}
      <li>
        <a href="#"
           data-contact-id="{{ contact.id }}"
           data-contact-name="{{ contact.name }}">{{ contact.name }}</a>
      </li>
    {% empty %}
      <li class="empty-message">No matching contacts found.</li>
    {% endfor %}
  </ul>
{% endif %}
