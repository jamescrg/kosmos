<div class="contact-tab-content">
  {# Intake Information #}
  {% if selected_contact.intake %}
    <div class="contact-intake-section">
      <h3>Intake Information</h3>
      <p class="intake-description">This contact was created from an intake submission.</p>
      <div class="action-buttons">
        <a href="{% url 'intakes:detail-index' id=selected_contact.intake.id %}"
           class="btn btn-outline-primary">
          <i class="bi bi-file-earmark-text"></i>
          View Intake Details
        </a>
      </div>
    </div>
  {% else %}
    <div class="contact-empty-state">
      <p>This contact does not have an associated intake.</p>
    </div>
  {% endif %}
</div>
