{% load humanize %}
<div class="contact-tab-content">
  {# Trust Balance Section #}
  {% if trust %}
    <div class="contact-financial-section">
      <h3>Trust Balance</h3>
      <div class="trust-balance-cards">
        <div class="balance-card">
          <div class="balance-label">Confirmed Balance</div>
          <div class="balance-amount {% if confirmed_balance < 0 %}balance-negative{% elif confirmed_balance > 0 %}balance-positive{% endif %}">
            ${{ confirmed_balance|floatformat:2|intcomma }}
          </div>
        </div>
        <div class="balance-card">
          <div class="balance-label">Pending Balance</div>
          <div class="balance-amount {% if pending_balance < 0 %}balance-negative{% elif pending_balance > 0 %}balance-positive{% endif %}">
            ${{ pending_balance|floatformat:2|intcomma }}
          </div>
        </div>
      </div>
      <div class="trust-actions">
        <a href="{% url 'trust:client-index' selected_contact.id %}"
           class="btn btn-outline-primary">
          <i class="bi bi-journal-text"></i>
          View Full Trust Ledger
        </a>
      </div>
    </div>
  {% else %}
    <div class="contact-empty-state">
      <p>This contact has no trust account activity.</p>
    </div>
  {% endif %}
</div>
