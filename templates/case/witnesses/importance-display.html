<div class="dropdown">
  <button class="button-link"
          type="button"
          data-bs-toggle="dropdown"
          aria-expanded="false">{{ witness.importance }}</button>
  <ul class="dropdown-menu">
    {% for i in "1234567890"|make_list %}
      <li>
        <a class="dropdown-item"
           href="#"
           hx-get="{% url 'case:witness-importance' witness.id forloop.counter %}"
           hx-target="#witnesses"><i class="icon-flag"></i> {{ forloop.counter }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
