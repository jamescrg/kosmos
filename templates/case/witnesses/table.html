<div class="table-container">
  <table id="witnesses-list" class="table witnesses-list">
    <tr>
      <th class="alignment">
        Alignment
        <button class="btn-sort {% if 'alignment' in current_order %}active{% endif %}"
                hx-get="{% url 'case:witnesses-sort' matter.id 'alignment' %}"
                hx-target="#witnesses">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="name">
        Name
        <button class="btn-sort {% if 'name' in current_order %}active{% endif %}"
                hx-get="{% url 'case:witnesses-sort' matter.id 'name' %}"
                hx-target="#witnesses">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="affiliation">
        Affiliation
        <button class="btn-sort {% if 'affiliation' in current_order %}active{% endif %}"
                hx-get="{% url 'case:witnesses-sort' matter.id 'affiliation' %}"
                hx-target="#witnesses">
          <i class="icon-chevrons-up-down"></i>
        </button>
      </th>
      <th class="knowledge">Knowledge</th>
      <th class="phone">Phone</th>
      <th class="email">Email</th>
      <th class="importance">
        <button class="btn-sort {% if 'importance' in current_order %}active{% endif %}"
                hx-get="{% url 'case:witnesses-sort' matter.id 'importance' %}"
                hx-target="#witnesses"
                title="Sort by importance">
          <i class="icon-flag"></i>
        </button>
      </th>
    </tr>
    {% for witness in witnesses %}
      {% include "case/witnesses/witness-row.html" %}
    {% empty %}
      <tr>
        <td colspan="7" class="empty-message">No witnesses found for this matter.</td>
      </tr>
    {% endfor %}
  </table>
</div>
