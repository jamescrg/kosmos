{% if document.date %}
  <a href="#"
     hx-get="{% url 'case:document-date' document.id %}"
     hx-target="closest td">{{ document.date|date:'Y-m-d' }}</a>
{% else %}
  <a href="#"
     class="btn-ghost"
     hx-get="{% url 'case:document-date' document.id %}"
     hx-target="closest td">
    <i class="icon-calendar-plus"></i>
  </a>
{% endif %}
