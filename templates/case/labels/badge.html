<span class="label-badge dropdown">
  <a href="#"
     class="app-badge label-{{ label.color }}"
     data-bs-toggle="dropdown"
     aria-expanded="false"><i class="icon-tag"></i>{{ label.name }}</a>
  <ul class="dropdown-menu">
    <li>
      <a class="dropdown-item urgent"
         href="#"
         hx-post="{% url 'case:remove-label-from' object_type object.id %}"
         hx-vals='{"label_id": "{{ label.id }}"{% if view %}, "view": "{{ view }}"{% endif %}}'
         hx-target="#{{ object_type }}-{{ object.id }}"
         hx-swap="outerHTML"><i class="icon-x"></i> Remove</a>
    </li>
  </ul>
</span>
