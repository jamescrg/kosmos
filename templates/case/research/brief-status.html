{% if brief.status == "complete" %}
  <a href="#"
     class="btn"
     hx-get="{% url 'case:research-brief-detail' brief.id %}"
     hx-target="#research"
     hx-swap="innerHTML">
    <i class="icon-file-text"></i> View Brief
  </a>
{% elif brief.status == "error" %}
  <span class="research-save-error">
    <i class="icon-alert-triangle"></i> Brief generation failed
  </span>
{% else %}
  <span class="research-status-msg"
        hx-get="{% url 'case:research-brief-status' brief.id %}"
        hx-trigger="load delay:3s"
        hx-target="this"
        hx-swap="outerHTML">
    <i class="icon-loader spin"></i> Generating Brief...
  </span>
{% endif %}
