{% load static %}
{% load cache_buster %}
<!DOCTYPE html>
<head>
  <meta charset="UTF-8" content="" />
  <title>{{ conversation.title|truncatechars:40 }} - AI Chat</title>
  <link rel="icon"
        type="image/x-icon"
        href="{% static 'images/ai-favicon.svg' %}" />
  <meta name="viewport" content="width = device-width, initial-scale = 1" />
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
        rel="stylesheet" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
  <link rel="stylesheet" href="{% static_v 'css/palette.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/colors.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/typeography.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/badges.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/buttons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/icons.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/forms.css' %}" />
  <link rel="stylesheet" href="{% static_v 'css/apps/case/ai.css' %}" />
  <style>
    body {
      margin: 0;
      padding: 0;
      background: var(--stone-300);
    }

    .ai-standalone-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 60rem;
      margin: 0 auto;
      padding: 0 1rem 1rem 1rem;
    }

    .ai-standalone-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.5rem 0;
    }

    .ai-standalone-header h1 {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 400;
      color: var(--stone-600);
      flex: 1;
    }

    .ai-chat-wrapper {
      flex: 1;
      margin-top: 0;
      min-height: 0;
    }
  </style>
</head>
<body hx-headers='{"X-CSRFToken": "{{ csrf_token }}"}'>
  <div class="ai-standalone-container">
    <div class="ai-standalone-header">
      <h1 id="conversationTitle">{{ conversation.title }}</h1>
      <span class="app-badge badge-purple">{{ matter.name }}</span>
    </div>
    <div class="ai-chat-wrapper">
      <div id="messageContainer" class="ai-messages">{% include "case/ai/messages.html" %}</div>
      <div class="ai-input-container">
        <form hx-post="{% url 'case:ai-send' %}"
              hx-target="#messageContainer"
              hx-swap="innerHTML scroll:#messageContainer:bottom"
              hx-indicator="#ai-loading"
              hx-disabled-elt="button[type='submit']"
              hx-on::after-request="this.reset()">
          <input type="hidden" name="conversation_id" value="{{ conversation.id }}">
          <div class="ai-input-wrapper">
            <textarea name="message"
                      id="aiMessageInput"
                      placeholder="Ask about this matter..."
                      rows="2"
                      required
                      autofocus
                      onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); this.form.requestSubmit(); }"></textarea>
          </div>
        </form>
        <div id="ai-loading" class="htmx-indicator ai-loading">
          <i class="bi bi-hourglass-split spin"></i>
          <span>Thinking...</span>
        </div>
      </div>
    </div>
  </div>
  <script src="https://unpkg.com/htmx.org@1.7.0"></script>
</body>
