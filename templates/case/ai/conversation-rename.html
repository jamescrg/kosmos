<form class="ai-rename-form"
      hx-post="{% url 'case:ai-rename-conversation' conversation.id %}"
      hx-target="#conversationList"
      hx-swap="innerHTML">
  <input type="text"
         name="title"
         value="{{ conversation.title }}"
         class="ai-rename-input"
         autofocus
         onkeydown="if(event.key === 'Escape') { htmx.trigger(document.body, 'conversationRenameCancel'); }">
  <button type="submit" class="ai-rename-save" title="Save">
    <i class="icon-check"></i>
  </button>
  <button type="button"
          class="ai-rename-cancel"
          title="Cancel"
          hx-get="{% url 'case:ai-conversations' %}"
          hx-target="#conversationList"
          hx-swap="innerHTML">
    <i class="icon-x"></i>
  </button>
</form>
