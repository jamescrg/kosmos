{% extends "base-minimal.html" %}
{% load static %}
{% load markdown_extras %}
{% block title %}
  AI Prompt - {{ matter.name }}
{% endblock title %}
{% block favicon %}
  <link rel="icon"
        type="image/svg+xml"
        href="{% static 'images/ai-favicon.svg' %}" />
{% endblock favicon %}
{% block content %}
  <div class="ai-prompt-page standalone">
    <div class="ai-prompt-canvas">
      <div class="toolbar">
        <div class="toolbar-left">
          <div class="toolbar-title">
            <h1>AI Prompt</h1>
          </div>
          <span class="app-badge badge-purple">{{ matter.name }}</span>
        </div>
        <div class="toolbar-right">
          <a href="#" id="copyPromptBtn" title="Copy to clipboard">
            <i class="icon-copy"></i>
          </a>
          <a href="#" onclick="window.close(); return false;" title="Close">
            <i class="icon-x"></i>
          </a>
        </div>
      </div>
      <div class="ai-prompt-content ai-markdown">{{ prompt_text|render_markdown }}</div>
    </div>
    <textarea id="promptPlainText" hidden>{{ prompt_text }}</textarea>
  </div>
  <script>
    document.getElementById('copyPromptBtn').addEventListener('click', function(e) {
      e.preventDefault();
      const promptText = document.getElementById('promptPlainText').value;
      navigator.clipboard.writeText(promptText).then(function() {
        const btn = document.getElementById('copyPromptBtn');
        const originalHtml = btn.innerHTML;
        btn.innerHTML = '<i class="icon-check"></i>';
        setTimeout(function() {
          btn.innerHTML = originalHtml;
        }, 2000);
      });
    });
  </script>
{% endblock content %}
