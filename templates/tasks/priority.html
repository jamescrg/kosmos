<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">{{ task.priority }}</button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    {% for i in "54321"|make_list %}
      <li>
        <a class="dropdown-item"
           href="#"
           hx-get="{% url 'tasks:task-priority' task_id=task.id priority=i %}"
           hx-target="#tasks"><i class="icon-flag"></i> {{ i }}</a>
      </li>
    {% endfor %}
  </ul>
</div>
