<div class="dropdown" x-data="dropdown()">
  <button class="button-link"
          type="button"
          x-ref="button"
          @click="toggle()"
          :aria-expanded="open">{{ task.status }}</button>
  <ul class="dropdown-menu" x-ref="menu" x-show="open">
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'tasks:set-status' task_id=task.id status='pending' %}"
         hx-target="#tasks">Pending</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'tasks:set-status' task_id=task.id status='in-progress' %}"
         hx-target="#tasks">In progress</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'tasks:set-status' task_id=task.id status='on-hold' %}"
         hx-target="#tasks">On hold</a>
    </li>
    <li>
      <a class="dropdown-item"
         href="#"
         hx-get="{% url 'tasks:set-status' task_id=task.id status='complete' %}"
         hx-target="#tasks">Complete</a>
    </li>
  </ul>
</div>
