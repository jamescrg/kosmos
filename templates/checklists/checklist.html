<div id="task-checklist" class="task-checklist">
  <ul class="checklist-items">
    {% for group in item_groups %}
      {% if group.section %}<li class="checklist-section-heading">{{ group.section.description }}</li>{% endif %}
      {% for entry in group.numbered_items %}
        <li class="checklist-item checklist-depth-{{ entry.item.depth }} {% if entry.item.is_complete %}checklist-item-complete{% endif %}">
          {% if entry.item.is_complete %}
            <i class="icon-square-check-big checklist-check-icon"
               hx-post="{% url 'checklists:toggle-checklist-item' entry.item.id %}{% if matter_id %}?matter_id={{ matter_id }}{% endif %}"
               hx-target="#task-checklist"
               hx-swap="outerHTML"></i>
          {% else %}
            <i class="icon-square checklist-check-icon"
               hx-post="{% url 'checklists:toggle-checklist-item' entry.item.id %}{% if matter_id %}?matter_id={{ matter_id }}{% endif %}"
               hx-target="#task-checklist"
               hx-swap="outerHTML"></i>
          {% endif %}
          <span class="checklist-item-text">{{ entry.item.description }}</span>
        </li>
      {% endfor %}
    {% endfor %}
  </ul>
</div>
